# docker-compose.yml
# orchestrate postgres and fastapi

version: '3.8'

services:
  db:
    image: postgres:15
    container_name: course_predictor_db
    environment:
      POSTGRES_DB: course_predictor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d course_predictor"]
      interval: 3s
      timeout: 3s
      retries: 10

  web:
    build: .
    container_name: course_predictor_web
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=course_predictor
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  pgdata:
